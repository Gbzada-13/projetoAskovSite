<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ASKOV | Login</title>
    <link rel="stylesheet" href="css/styleLogin.css?v=1.1">
</head>
<body>
    <header class="cabeçalho">
        <a href="telaInicial.html" class="logo-link"><h1>ASKOV</h1></a>
        <div class="patrocinadores"><button><a href="#">Patrocinadores</a></button></div>
        <div class="campeonatos"><button><a href="#">Campeonatos</a></button></div>
        <div class="sobre"><button><a href="#">Sobre</a></button></div>
        <div class="botão-login"><a href="login.html"><button>Login</button></a></div>
        <div class="botão-cadastro"><a href="cadastro.html"><button>Cadastre-se</button></a></div>
    </header>
    <div class="minhaDiv2">
        <h2>Login</h2>
        <div class="inputsL">
            <label for="campo-cpf">CPF</label>
            <input type="text" placeholder="000.000.000-00" id="campo-cpf">
            <label for="campo-senha">Senha</label>
            <input type="password" placeholder="Digite sua senha" id="campo-senha">
            <a href="">Esqueci minha senha</a>
        </div>
        <button onclick="fazerLogin()">Login</button>
        <p id="senha-incorreta"></p>
    </div>
    <script src="js/login.js" defer></script>
</body>
</html>
